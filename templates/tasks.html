<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tasks</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="turquoise-bg">

<div class="tasks-page">

  <h1 class="page-title">Current Tasks</h1>

  <div class="tasks-layout">

    <div id="taskList" class="task-list"></div>

    <div class="task-actions">
      <button onclick="addTaskBox()">Add Task</button>
      <select id="sortSelect" onchange="sortTasks(this.value)">
        <option value="">Sort Tasks</option>
        <option value="priority">By Priority</option>
        <option value="due_date">By Due Date</option>
        <option value="status">By Status</option>
        <option value="revert">Revert to Original</option>
      </select>
    </div>
  </div>

  <button class="back-btn" onclick="window.location.href='/home'">Back</button>

</div>

<script src="/static/tasks.js"></script>
</body>
</html>
