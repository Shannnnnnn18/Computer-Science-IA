<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard — Task Manager</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h2 id="welcome">Welcome</h2>
    <div>
      <button id="themeToggle">Toggle Theme</button>
      <a href="/logout">Logout</a>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <button id="addBtn">Add Task</button>

      <label>Filter:
        <select id="filterBy">
          <option value="all">All</option>
          <option value="Pending">Pending</option>
          <option value="Completed">Completed</option>
        </select>
      </label>

      <label>Priority:
        <select id="priorityFilter">
          <option value="all">All</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </label>
    </section>

    <section id="taskArea"></section>
  </main>

  <!-- Add/Edit form (simple modal-like) -->
  <div id="modal" class="modal hidden">
    <form id="taskForm" class="modal-content">
      <h3 id="formTitle">Add Task</h3>
      <input id="t_title" placeholder="Title" required>
      <textarea id="t_description" placeholder="Description"></textarea>
      <input id="t_dueDate" placeholder="Due date (YYYY-MM-DDThh:mm:ss)">
      <select id="t_priority">
        <option>High</option><option>Medium</option><option>Low</option>
      </select>
      <input id="t_tags" placeholder="Tags (comma separated)">
      <input id="t_reminder" placeholder="Reminder (ISO datetime)">
      <input type="hidden" id="t_taskID" value="">
      <div class="modal-actions">
        <button type="submit">Save</button>
        <button type="button" id="cancelBtn">Cancel</button>
      </div>
    </form>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
